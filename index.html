<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>กระดานภารกิจ</title>

<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#14131a">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Quest Board">

<style>
  :root{
    --ink:#14131a; --panel:#1e1c26; --panel-2:#252230; --line:#332f42;
    --bone:#e8e3da; --muted:#8c8699;
    --copper:#c87b4e; --silver:#b9c1cc; --gold:#e3b23c; --jade:#4fb286; --blood:#c0564f;
    --display:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Noto Serif Thai",serif;
    --body:system-ui,-apple-system,"Segoe UI","Noto Sans Thai",sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    margin:0;background:var(--ink);color:var(--bone);
    font-family:var(--body);font-size:15px;line-height:1.5;
    background-image:radial-gradient(1200px 600px at 50% -10%,#241f33 0%,transparent 60%);
    min-height:100vh;overscroll-behavior-y:contain;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .wrap{max-width:860px;margin:0 auto;padding:0 14px 90px}

  /* ---- แถบวันที่ + เหรียญ ---- */
  .bar-top{position:sticky;top:0;z-index:20;background:rgba(20,19,26,.93);backdrop-filter:blur(12px);
    margin:0 -14px;padding:12px 14px 10px;border-bottom:1px solid var(--line)}
  .bar-top .inner{display:flex;align-items:center;gap:12px;max-width:860px;margin:0 auto}
  .brand{font:10px/1 var(--mono);letter-spacing:.2em;text-transform:uppercase;color:#5d5670;margin-bottom:6px}
  .datebig{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
  .datebig .day{font-family:var(--display);font-size:21px;font-weight:600}
  .datebig .clock{font:600 15px/1 var(--mono);color:var(--gold);font-variant-numeric:tabular-nums}
  .datebig .clock .sep{animation:blink 2s steps(1,end) infinite}
  @keyframes blink{0%,50%{opacity:1}51%,100%{opacity:.25}}
  .subline{font:11px/1.5 var(--mono);color:var(--muted);margin-top:3px;display:flex;gap:6px;flex-wrap:wrap}
  .subline .hot{color:var(--copper)}

  .purse{display:flex;gap:6px;flex:none}
  .coin{display:flex;align-items:center;gap:5px;background:var(--panel);border:1px solid var(--line);
    border-radius:999px;padding:4px 9px 4px 4px}
  .disc{width:18px;height:18px;border-radius:50%;display:grid;place-items:center;
    font:600 9px/1 var(--mono);color:#2a2130;flex:none;
    box-shadow:inset 0 -2px 3px rgba(0,0,0,.35),inset 0 2px 2px rgba(255,255,255,.35)}
  .d-c{background:linear-gradient(160deg,#e09b6f,#a75f38)}
  .d-s{background:linear-gradient(160deg,#e2e8ef,#8e96a2)}
  .d-g{background:linear-gradient(160deg,#f6d67e,#c08d1e)}
  .coin b{font:600 14px/1 var(--mono);font-variant-numeric:tabular-nums}
  .coin.pop{animation:pop .45s cubic-bezier(.2,1.6,.4,1)}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.2)}100%{transform:scale(1)}}
  @media(max-width:430px){
    .purse{flex-direction:column;gap:3px}
    .coin{padding:2px 7px 2px 2px}.coin b{font-size:12px}
    .disc{width:15px;height:15px;font-size:8px}
    .datebig .day{font-size:18px}
  }

  nav{display:flex;gap:2px;margin:14px 0 16px;border-bottom:1px solid var(--line)}
  nav button{flex:1;background:none;border:0;border-bottom:2px solid transparent;color:var(--muted);
    font-family:var(--body);font-size:13px;padding:11px 4px;cursor:pointer;margin-bottom:-1px}
  nav button[aria-selected="true"]{color:var(--bone);border-bottom-color:var(--gold)}

  /* ---- ภารกิจ ---- */
  .group{background:var(--panel);border:1px solid var(--line);border-radius:12px;margin-bottom:12px;overflow:hidden}
  .group-head{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line);background:var(--panel-2)}
  .group-head h2{font-family:var(--display);font-size:17px;margin:0;font-weight:600;flex:1;min-width:0}
  .bar{height:3px;background:var(--line);border-radius:2px;width:56px;overflow:hidden;flex:none}
  .bar i{display:block;height:100%;background:var(--jade);transition:width .35s ease}
  .pct{font:11px/1 var(--mono);color:var(--muted);flex:none}

  ul{list-style:none;margin:0;padding:0}
  .node{border-bottom:1px solid rgba(51,47,66,.6)}
  .node:last-child{border-bottom:0}
  .row{display:flex;align-items:center;gap:9px;padding:10px 12px}
  .row.off{opacity:.4}
  .kids{padding-left:14px;border-left:1px solid var(--line);margin-left:24px}

  .seal{width:26px;height:26px;border-radius:50%;border:1.5px solid #4a445c;background:transparent;
    cursor:pointer;flex:none;display:grid;place-items:center;transition:.15s;padding:0;color:transparent}
  .seal.on{background:var(--jade);border-color:var(--jade);color:#10261d;font-size:14px;font-weight:700}
  .seal.on::after{content:"✓"}

  .cell{flex:1;min-width:0}
  .title{overflow-wrap:anywhere}
  .done .title{color:var(--muted);text-decoration:line-through}
  .meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:2px}
  .when{font:10px/1.4 var(--mono);color:var(--jade);opacity:.8}
  .tag{font:9px/1.3 var(--mono);letter-spacing:.04em;color:var(--gold);
    border:1px solid rgba(227,178,60,.4);border-radius:4px;padding:2px 4px;white-space:nowrap}
  .tag.rep{color:var(--silver);border-color:rgba(185,193,204,.3)}
  .tag.time{color:var(--bone);border-color:var(--line);background:rgba(255,255,255,.04)}
  .tag.late{color:var(--blood);border-color:rgba(192,86,79,.5);background:rgba(192,86,79,.1)}
  .price{font:13px/1 var(--mono);color:var(--muted);white-space:nowrap;flex:none}
  .price .c{color:var(--copper)} .price .s{color:var(--silver)} .price .g{color:var(--gold)}

  .mini{background:none;border:0;color:#5d5670;cursor:pointer;font-size:15px;
    min-width:30px;height:30px;border-radius:6px;flex:none}
  .mini:active{background:rgba(255,255,255,.08);color:var(--bone)}
  .mini.del:active{color:var(--blood)}

  /* ---- ฟอร์ม ---- */
  .form{display:flex;flex-direction:column;gap:8px;padding:12px;background:rgba(0,0,0,.2)}
  .frow{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  input[type=text],input[type=number],input[type=time],input[type=date],select,textarea{
    background:var(--ink);border:1px solid var(--line);color:var(--bone);
    border-radius:8px;padding:9px 10px;font-family:var(--body);font-size:16px}
  input[type=text],textarea{flex:1;min-width:130px}
  textarea{width:100%;resize:vertical;min-height:56px;font-size:15px}
  input[type=number]{width:58px;font-family:var(--mono);text-align:center}
  select{flex:none}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--gold);outline-offset:1px}
  .coinset{display:flex;align-items:center;gap:4px}
  .coinset span{font:11px/1 var(--mono);color:var(--muted)}
  .lbl{font:11px/1 var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
  .btn{background:var(--gold);color:#2a2130;border:0;border-radius:8px;padding:11px 16px;
    font-family:var(--body);font-size:15px;font-weight:600;cursor:pointer;white-space:nowrap}
  .btn.ghost{background:none;border:1px solid var(--line);color:var(--muted)}
  .btn:disabled{opacity:.35}
  .btn.sm{padding:8px 12px;font-size:13px}

  .days{display:flex;gap:4px}
  .days button{width:34px;height:34px;border-radius:8px;border:1px solid var(--line);background:var(--ink);
    color:var(--muted);font-family:var(--body);font-size:13px;cursor:pointer;padding:0}
  .days button[aria-pressed="true"]{background:var(--gold);color:#2a2130;border-color:var(--gold);font-weight:700}

  /* ---- ร้าน ---- */
  .shop{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:9px}
  .card.afford{border-color:rgba(227,178,60,.45)}
  .card h3{margin:0;font-family:var(--display);font-size:17px;font-weight:600}
  .card .foot{display:flex;align-items:center;gap:8px;margin-top:auto}
  .owned{font:11px/1 var(--mono);color:var(--jade)}

  /* ---- ไทม์ไลน์ ---- */
  .year{font-family:var(--display);font-size:26px;color:#4a445c;margin:22px 0 10px;letter-spacing:.02em}
  .tl{position:relative;padding-left:34px}
  .tl::before{content:"";position:absolute;left:13px;top:6px;bottom:6px;width:2px;
    background:linear-gradient(180deg,var(--gold),rgba(227,178,60,.15))}
  .ev{position:relative;margin-bottom:14px}
  .ev .dot{position:absolute;left:-34px;top:2px;width:28px;height:28px;border-radius:50%;
    background:var(--panel-2);border:2px solid var(--gold);display:grid;place-items:center;font-size:14px}
  .ev .box{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
  .ev .box.pin{border-color:rgba(227,178,60,.5);background:linear-gradient(180deg,rgba(227,178,60,.07),transparent)}
  .ev .d{font:10px/1.4 var(--mono);color:var(--gold);letter-spacing:.06em}
  .ev h3{margin:2px 0 0;font-family:var(--display);font-size:18px;font-weight:600}
  .ev p{margin:5px 0 0;font-size:14px;color:#c3bdb3;white-space:pre-wrap;overflow-wrap:anywhere}
  .ev .ago{font:10px/1.4 var(--mono);color:#5d5670;margin-top:6px;display:block}
  .ev .x{position:absolute;top:8px;right:8px}
  .icons{display:flex;gap:5px;flex-wrap:wrap}
  .icons button{width:36px;height:36px;border-radius:8px;border:1px solid var(--line);background:var(--ink);
    font-size:17px;cursor:pointer;padding:0}
  .icons button[aria-pressed="true"]{border-color:var(--gold);background:rgba(227,178,60,.14)}

  .empty{border:1px dashed var(--line);border-radius:12px;padding:26px;text-align:center;color:var(--muted)}
  .log{font-family:var(--mono);font-size:12px;color:var(--muted)}
  .log li{display:flex;gap:10px;align-items:center;padding:7px 0;border-bottom:1px solid rgba(51,47,66,.5)}
  .log time{color:#5d5670;flex:none;font-variant-numeric:tabular-nums}
  .stat{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line)}
  .hint{font-size:12px;color:var(--muted);margin:10px 2px}
  .hidden{display:none}

  #install{position:fixed;left:14px;right:14px;bottom:calc(14px + env(safe-area-inset-bottom));z-index:40;
    display:none;align-items:center;gap:10px;background:var(--panel-2);border:1px solid var(--gold);
    border-radius:12px;padding:12px 14px;box-shadow:0 10px 30px rgba(0,0,0,.5);max-width:600px;margin:0 auto}
  #install p{margin:0;flex:1;font-size:13px}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<div class="wrap">
  <div class="bar-top">
    <div class="inner">
      <div style="flex:1;min-width:0">
        <div class="brand">Quest Board</div>
        <div class="datebig">
          <span class="day" id="dToday">—</span>
          <span class="clock" id="dClock">—</span>
        </div>
        <div class="subline">
          <span id="dWeek">—</span><span>·</span><span id="dReset">—</span>
        </div>
      </div>
      <div class="purse" id="purse">
        <div class="coin"><span class="disc d-g">G</span><b id="pG">0</b></div>
        <div class="coin"><span class="disc d-s">S</span><b id="pS">0</b></div>
        <div class="coin"><span class="disc d-c">C</span><b id="pC">0</b></div>
      </div>
    </div>
  </div>

  <nav>
    <button id="tab-q" aria-selected="true">ภารกิจ</button>
    <button id="tab-t" aria-selected="false">ไทม์ไลน์</button>
    <button id="tab-s" aria-selected="false">ร้านรางวัล</button>
    <button id="tab-l" aria-selected="false">สรุป</button>
  </nav>

  <!-- ภารกิจ -->
  <section id="view-q">
    <div id="groups"></div>
    <div class="form" style="border:1px solid var(--line);border-radius:12px;background:var(--panel)">
      <div class="frow">
        <input type="text" id="gName" placeholder="ชื่อหมวดใหม่ เช่น งาน / สุขภาพ">
        <button class="btn" id="gAdd">เพิ่มหมวด</button>
      </div>
    </div>
    <p class="hint">แตะวงกลมเพื่อจบภารกิจแล้วรับเหรียญ • ＋ = เพิ่มข้อย่อย • ภารกิจที่ไม่ใช่ของวันนี้จะจางลงและกดไม่ได้ • 100 Copper = 1 Silver, 100 Silver = 1 Gold</p>
  </section>

  <!-- ไทม์ไลน์ -->
  <section id="view-t" class="hidden">
    <div class="form" style="border:1px solid var(--line);border-radius:12px;background:var(--panel);margin-bottom:8px">
      <div class="frow">
        <input type="date" id="eDate">
        <input type="text" id="eTitle" placeholder="เหตุการณ์สำคัญ เช่น เรียนจบ, ย้ายบ้าน">
      </div>
      <textarea id="eNote" placeholder="รายละเอียด / ความรู้สึกตอนนั้น (ไม่ใส่ก็ได้)"></textarea>
      <div class="frow">
        <div class="icons" id="eIcons"></div>
        <label class="lbl" style="display:flex;align-items:center;gap:6px;margin-left:auto">
          <input type="checkbox" id="ePin" style="width:18px;height:18px;accent-color:var(--gold)"> หมุดหมายใหญ่
        </label>
        <button class="btn" id="eAdd">บันทึกลงไทม์ไลน์</button>
      </div>
    </div>
    <div id="timeline"></div>
  </section>

  <!-- ร้าน -->
  <section id="view-s" class="hidden">
    <div class="shop" id="shop"></div>
    <div class="form" style="border:1px solid var(--line);border-radius:12px;background:var(--panel)">
      <div class="frow">
        <input type="text" id="rName" placeholder="รางวัลที่อยากได้ เช่น ดูหนัง 1 เรื่อง">
        <div class="coinset">
          <span>G</span><input type="number" id="rG" min="0" value="0">
          <span>S</span><input type="number" id="rS" min="0" value="0">
          <span>C</span><input type="number" id="rC" min="0" value="50">
        </div>
        <button class="btn" id="rAdd">เพิ่มรางวัล</button>
      </div>
    </div>
  </section>

  <!-- สรุป -->
  <section id="view-l" class="hidden">
    <div id="stats"></div>
    <h2 style="font-family:var(--display);font-size:18px;margin:22px 0 8px">บันทึกล่าสุด</h2>
    <ul class="log" id="log"></ul>
    <div style="margin-top:24px;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn ghost" id="expBtn">สำรองข้อมูล (.json)</button>
      <button class="btn ghost" id="impBtn">กู้คืนจากไฟล์</button>
      <input type="file" id="impFile" accept="application/json" class="hidden">
      <button class="btn ghost" id="wipeBtn" style="border-color:rgba(192,86,79,.5);color:#c9736d">ล้างข้อมูล</button>
    </div>
    <p class="hint" id="storageNote"></p>
  </section>
</div>

<div id="install">
  <p>ติดตั้งลงหน้าโฮมเพื่อเปิดเต็มจอและใช้ออฟไลน์ได้</p>
  <button class="btn" id="installBtn">ติดตั้ง</button>
  <button class="mini" id="installX">✕</button>
</div>

<script>
/* ================= storage ================= */
const KEY = "questboard_v1";
const hasCloud = typeof window.storage !== "undefined" && window.storage;
const store = {
  async load(){
    if (hasCloud){ try{ const r = await window.storage.get(KEY); return r ? JSON.parse(r.value) : null; }catch(e){ return null; } }
    try{ const v = localStorage.getItem(KEY); return v ? JSON.parse(v) : null; }catch(e){ return null; }
  },
  async save(d){
    const s = JSON.stringify(d);
    if (hasCloud){ try{ await window.storage.set(KEY, s); return; }catch(e){} }
    try{ localStorage.setItem(KEY, s); }catch(e){}
  }
};

let S = { copper:0, earned:0, spent:0, groups:[], rewards:[], events:[], log:[] };
const uid = () => Math.random().toString(36).slice(2,9);
const save = () => store.save(S);
const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/[&<>"]/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));

/* ================= เวลา ================= */
const TH = "th-TH";
const DAY_SHORT = ["อา","จ","อ","พ","พฤ","ศ","ส"];          // index = getDay() (0=อาทิตย์)
const REPEATS = { once:"ครั้งเดียว", daily:"ทุกวัน", days:"บางวัน", weekly:"ทุกสัปดาห์" };

function weekKey(d=new Date()){
  const t = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day = t.getUTCDay() || 7;
  t.setUTCDate(t.getUTCDate() + 4 - day);
  const y0 = new Date(Date.UTC(t.getUTCFullYear(),0,1));
  const w = Math.ceil(((t - y0)/86400000 + 1)/7);
  return t.getUTCFullYear() + "-W" + String(w).padStart(2,"0");
}
const dayKey  = (d=new Date()) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
let WK = weekKey(), curDay = dayKey();

const mondayOf = (d=new Date()) => { const k = d.getDay() || 7; return new Date(d.getFullYear(), d.getMonth(), d.getDate() - (k-1)); };
const nextMonday = (d=new Date()) => { const m = mondayOf(d); return new Date(m.getFullYear(), m.getMonth(), m.getDate()+7); };

function tickClock(){
  const now = new Date();
  $("dToday").textContent = now.toLocaleDateString(TH,{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  $("dClock").innerHTML = `${String(now.getHours()).padStart(2,"0")}<span class="sep">:</span>${String(now.getMinutes()).padStart(2,"0")}`;
  const mon = mondayOf(now), sun = new Date(mon.getFullYear(),mon.getMonth(),mon.getDate()+6), o = {day:"numeric",month:"short"};
  $("dWeek").textContent = `สัปดาห์ ${mon.toLocaleDateString(TH,o)} – ${sun.toLocaleDateString(TH,o)}`;
  const ms = nextMonday(now) - now, dd = Math.floor(ms/86400000), hrs = Math.floor(ms%86400000/3600000);
  const el = $("dReset");
  el.textContent = dd > 0 ? `รีเซ็ตรายสัปดาห์อีก ${dd} วัน ${hrs} ชม.` : `รีเซ็ตรายสัปดาห์อีก ${hrs} ชม.`;
  el.className = dd === 0 ? "hot" : "";
}
function fmtWhen(ts){
  if (!ts) return "";
  const d = new Date(ts), now = new Date();
  const t = d.toLocaleTimeString(TH,{hour:"2-digit",minute:"2-digit"});
  if (dayKey(d) === dayKey(now)) return "เสร็จวันนี้ " + t;
  const y = new Date(now.getFullYear(), now.getMonth(), now.getDate()-1);
  if (dayKey(d) === dayKey(y)) return "เสร็จเมื่อวาน " + t;
  return "เสร็จ " + d.toLocaleDateString(TH,{day:"numeric",month:"short"}) + " " + t;
}
function agoText(dateStr){
  const d = new Date(dateStr + "T00:00:00"), now = new Date();
  const days = Math.round((new Date(now.getFullYear(),now.getMonth(),now.getDate()) - d)/86400000);
  if (days === 0) return "วันนี้";
  if (days === 1) return "เมื่อวาน";
  if (days < 0)  return `อีก ${Math.abs(days)} วัน`;
  if (days < 30) return `${days} วันก่อน`;
  if (days < 365){ const m = Math.round(days/30); return `${m} เดือนก่อน`; }
  const y = (days/365);
  return `${y < 2 ? "1" : Math.floor(y)} ปีก่อน`;
}

/* ================= coins ================= */
function fmt(c){
  const g = Math.floor(c/10000), s = Math.floor((c%10000)/100), k = c%100, p = [];
  if (g) p.push(`<span class="g">${g}g</span>`);
  if (s) p.push(`<span class="s">${s}s</span>`);
  if (k || !p.length) p.push(`<span class="c">${k}c</span>`);
  return p.join(" ");
}
const addLog = (text, amount) => { S.log.unshift({t:Date.now(), text, amount}); S.log = S.log.slice(0,80); };

/* ================= tree ================= */
function walk(nodes, fn){ nodes.forEach(n => { fn(n); walk(n.children, fn); }); }
function findNode(id){ let hit=null; S.groups.forEach(g => walk(g.children, n => { if(n.id===id) hit=n; })); return hit; }
function removeNode(id){
  const strip = arr => {
    const i = arr.findIndex(n => n.id===id);
    if (i>-1){ arr.splice(i,1); return true; }
    return arr.some(n => strip(n.children));
  };
  S.groups.some(g => strip(g.children));
}
function addChild(pid, node){
  const g = S.groups.find(x => x.id===pid);
  if (g){ g.children.push(node); return; }
  const p = findNode(pid);
  if (p) p.children.push(node);
}

/* ภารกิจนี้ "ใช้งานได้วันนี้" ไหม */
function activeToday(n){
  if (n.repeat === "days") return (n.days||[]).includes(new Date().getDay());
  if (n.repeat === "once" && n.date) return n.date <= curDay;   // ยังไม่ถึงวันนัด = ยังกดไม่ได้
  return true;
}
/* รีเซ็ตตามรอบ */
function resetCycles(){
  let ch = false;
  S.groups.forEach(g => walk(g.children, n => {
    if (!n.done) return;
    const stale = (n.repeat === "daily" || n.repeat === "days") ? n.day !== curDay
                : (n.repeat === "weekly")                       ? n.week !== WK
                : false;
    if (stale){ n.done=false; n.day=null; n.week=null; n.doneAt=null; ch=true; }
  }));
  if (ch) save();
  return ch;
}

/* ================= render: ภารกิจ ================= */
function renderPurse(pop){
  const c = S.copper;
  $("pG").textContent = Math.floor(c/10000);
  $("pS").textContent = Math.floor((c%10000)/100);
  $("pC").textContent = c%100;
  if (pop) [...$("purse").children].forEach(el => { el.classList.remove("pop"); void el.offsetWidth; el.classList.add("pop"); });
}
function coinInputs(val=0){
  const g = Math.floor(val/10000), s = Math.floor((val%10000)/100), c = val%100;
  return `<div class="coinset">
    <span>G</span><input type="number" min="0" value="${g}" data-k="g">
    <span>S</span><input type="number" min="0" value="${s}" data-k="s">
    <span>C</span><input type="number" min="0" value="${c}" data-k="c">
  </div>`;
}
/* ฟอร์มภารกิจ: ชื่อ / เหรียญ / ทำซ้ำ / เวลา-วันที่ */
function taskForm(n){
  const rep  = n ? n.repeat : "once";
  const days = n && n.days ? n.days : [];
  const time = n && n.time ? n.time : "";
  const date = n && n.date ? n.date : "";
  return `
  <div class="frow">
    <input type="text" data-k="t" value="${n?esc(n.title):""}" placeholder="ชื่อภารกิจ">
    ${coinInputs(n ? n.coin : 10)}
  </div>
  <div class="frow">
    <span class="lbl">ทำซ้ำ</span>
    <select data-k="rep">
      ${Object.entries(REPEATS).map(([k,v]) => `<option value="${k}" ${rep===k?"selected":""}>${v}</option>`).join("")}
    </select>
    <div class="days ${rep==="days"?"":"hidden"}" data-k="days">
      ${DAY_SHORT.map((d,i) => `<button type="button" data-day="${i}" aria-pressed="${days.includes(i)}">${d}</button>`).join("")}
    </div>
  </div>
  <div class="frow">
    <span class="lbl">เวลา</span>
    <input type="time" data-k="time" value="${time}">
    <span class="lbl date-lbl ${rep==="once"?"":"hidden"}">วันที่</span>
    <input type="date" data-k="date" value="${date}" class="date-in ${rep==="once"?"":"hidden"}">
  </div>`;
}
function readTask(f){
  const rep  = f.querySelector('[data-k="rep"]').value;
  const days = [...f.querySelectorAll('[data-day][aria-pressed="true"]')].map(b => +b.dataset.day);
  const v = k => parseInt(f.querySelector(`[data-k="${k}"]`).value || 0, 10) || 0;
  return {
    title: f.querySelector('[data-k="t"]').value.trim(),
    coin:  v("g")*10000 + v("s")*100 + v("c"),
    repeat: rep,
    days:  rep === "days" ? days : [],
    time:  f.querySelector('[data-k="time"]').value || null,
    date:  rep === "once" ? (f.querySelector('[data-k="date"]').value || null) : null
  };
}
function tagsFor(n){
  const t = [];
  if (n.repeat === "daily")  t.push(`<span class="tag rep">ทุกวัน</span>`);
  if (n.repeat === "weekly") t.push(`<span class="tag rep">ทุกสัปดาห์</span>`);
  if (n.repeat === "days" && n.days.length)
    t.push(`<span class="tag rep">${n.days.slice().sort().map(i => DAY_SHORT[i]).join(" ")}</span>`);
  if (n.date){
    const d = new Date(n.date + "T00:00:00");
    t.push(`<span class="tag">${d.toLocaleDateString(TH,{day:"numeric",month:"short"})}</span>`);
  }
  if (n.time){
    const now = new Date();
    const late = !n.done && activeToday(n) && n.time < `${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;
    t.push(`<span class="tag time ${late?"late":""}">${late?"เลย ":""}${n.time} น.</span>`);
  }
  return t.join("");
}
function nodeHTML(n){
  const on = activeToday(n);
  return `<li class="node" data-id="${n.id}">
    <div class="row ${n.done?"done":""} ${on?"":"off"}">
      <button class="seal ${n.done?"on":""}" data-act="toggle" ${on?"":"disabled"} aria-label="ทำเสร็จ"></button>
      <span class="cell">
        <span class="title">${esc(n.title)}</span>
        <span class="meta">
          ${tagsFor(n)}
          ${n.done && n.doneAt ? `<span class="when">${fmtWhen(n.doneAt)}</span>` : ""}
        </span>
      </span>
      <span class="price">${fmt(n.coin)}</span>
      <button class="mini" data-act="sub" aria-label="เพิ่มข้อย่อย">＋</button>
      <button class="mini" data-act="edit" aria-label="แก้ไข">✎</button>
      <button class="mini del" data-act="del" aria-label="ลบ">✕</button>
    </div>
    <ul class="kids">${n.children.map(nodeHTML).join("")}</ul>
  </li>`;
}
function renderQuests(){
  const box = $("groups");
  if (!S.groups.length){ box.innerHTML = `<div class="empty">ยังไม่มีหมวด — ตั้งชื่อหมวดแรกด้านล่าง</div>`; return; }
  box.innerHTML = S.groups.map(g => {
    let tot=0, done=0;
    walk(g.children, n => { if (activeToday(n)){ tot++; if (n.done) done++; } });   // นับเฉพาะของวันนี้
    const pct = tot ? Math.round(done/tot*100) : 0;
    return `<div class="group" data-gid="${g.id}">
      <div class="group-head">
        <h2>${esc(g.name)}</h2>
        <span class="bar"><i style="width:${pct}%"></i></span>
        <span class="pct">${done}/${tot}</span>
        <button class="mini" data-act="addhere" aria-label="เพิ่มภารกิจ">＋</button>
        <button class="mini del" data-act="delgroup" aria-label="ลบหมวด">✕</button>
      </div>
      <ul>${g.children.map(nodeHTML).join("")}</ul>
      <div class="form addbox hidden">
        ${taskForm(null)}
        <div class="frow">
          <button class="btn" data-act="addtask">เพิ่มภารกิจ</button>
          <button class="btn ghost" data-act="cancel">ยกเลิก</button>
        </div>
      </div>
    </div>`;
  }).join("");
}

/* ================= render: ไทม์ไลน์ ================= */
const ICONS = ["⭐","🏆","🎓","💼","🏠","❤️","✈️","🌱","🎉","💡","🩺","📕"];
let pickIcon = "⭐";
function renderIconPicker(){
  $("eIcons").innerHTML = ICONS.map(i => `<button type="button" data-ico="${i}" aria-pressed="${i===pickIcon}">${i}</button>`).join("");
}
function renderTimeline(){
  const box = $("timeline");
  if (!S.events.length){
    box.innerHTML = `<div class="empty">ยังไม่มีเหตุการณ์ — บันทึกหมุดหมายแรกของคุณด้านบน<br><span style="font-size:12px">เช่น วันเริ่มงานใหม่ วันที่ตัดสินใจครั้งใหญ่ วันที่ทำสำเร็จ</span></div>`;
    return;
  }
  const ev = [...S.events].sort((a,b) => b.date.localeCompare(a.date));
  let html = "", year = null;
  ev.forEach(e => {
    const y = new Date(e.date + "T00:00:00").getFullYear() + 543;
    if (y !== year){
      if (year !== null) html += `</div>`;
      html += `<div class="year">${y}</div><div class="tl">`;
      year = y;
    }
    const d = new Date(e.date + "T00:00:00");
    html += `<div class="ev" data-eid="${e.id}">
      <div class="dot">${e.icon || "⭐"}</div>
      <div class="box ${e.pin?"pin":""}">
        <button class="mini del x" data-act="delevent" aria-label="ลบ">✕</button>
        <div class="d">${d.toLocaleDateString(TH,{weekday:"short",day:"numeric",month:"long"})}</div>
        <h3>${esc(e.title)}</h3>
        ${e.note ? `<p>${esc(e.note)}</p>` : ""}
        <span class="ago">${agoText(e.date)}</span>
      </div>
    </div>`;
  });
  html += `</div>`;
  box.innerHTML = html;
}

/* ================= render: ร้าน / สรุป ================= */
function renderShop(){
  const box = $("shop");
  if (!S.rewards.length){ box.innerHTML = `<div class="empty" style="grid-column:1/-1">ร้านยังว่าง — เพิ่มรางวัลที่อยากแลกด้านล่าง</div>`; return; }
  box.innerHTML = S.rewards.map(r => {
    const ok = S.copper >= r.price;
    return `<div class="card ${ok?"afford":""}" data-rid="${r.id}">
      <h3>${esc(r.name)}</h3>
      <div class="price">${fmt(r.price)}</div>
      <div class="foot">
        <button class="btn" data-act="buy" ${ok?"":"disabled"}>แลกรางวัล</button>
        ${r.bought ? `<span class="owned">แลกแล้ว ${r.bought}×</span>` : ""}
        <button class="mini del" data-act="delreward" style="margin-left:auto">✕</button>
      </div>
    </div>`;
  }).join("");
}
function renderLog(){
  let daily=0, weekly=0, dayly=0;
  S.groups.forEach(g => walk(g.children, n => {
    if (n.repeat==="daily") daily++;
    else if (n.repeat==="weekly") weekly++;
    else if (n.repeat==="days") dayly++;
  }));
  $("stats").innerHTML = `
    <div class="stat"><span>เหรียญในกระเป๋า</span><b class="price">${fmt(S.copper)}</b></div>
    <div class="stat"><span>หาได้ทั้งหมด</span><b class="price">${fmt(S.earned)}</b></div>
    <div class="stat"><span>ใช้ไปทั้งหมด</span><b class="price">${fmt(S.spent)}</b></div>
    <div class="stat"><span>ภารกิจทำซ้ำ</span><b class="price" style="color:var(--muted)">ทุกวัน ${daily} · บางวัน ${dayly} · สัปดาห์ ${weekly}</b></div>
    <div class="stat"><span>หมุดหมายในไทม์ไลน์</span><b class="price" style="color:var(--muted)">${S.events.length} เหตุการณ์</b></div>`;
  $("log").innerHTML = S.log.length ? S.log.map(e => {
    const d = new Date(e.t);
    const stamp = d.toLocaleDateString(TH,{day:"numeric",month:"short"}) + " " + d.toLocaleTimeString(TH,{hour:"2-digit",minute:"2-digit"});
    const amt = e.amount>0 ? `<span class="price" style="margin-left:auto">+${fmt(e.amount)}</span>`
              : e.amount<0 ? `<span class="price" style="margin-left:auto;opacity:.7">−${fmt(-e.amount)}</span>` : "";
    return `<li><time>${stamp}</time><span>${esc(e.text)}</span>${amt}</li>`;
  }).join("") : `<li style="border:0;color:#5d5670">ยังไม่มีบันทึก</li>`;
  $("storageNote").textContent = hasCloud
    ? "บันทึกอัตโนมัติในพื้นที่เก็บของ artifact"
    : "บันทึกอัตโนมัติในเครื่องนี้ (localStorage) — แนะนำให้กดสำรองข้อมูลเป็นระยะ";
}
function render(pop){
  tickClock(); renderPurse(pop); renderQuests(); renderTimeline(); renderShop(); renderLog();
}

/* ================= actions ================= */
function toggle(id){
  const n = findNode(id); if (!n || !activeToday(n)) return;
  if (!n.done){
    n.done=true; n.day=curDay; n.week=WK; n.doneAt=Date.now();
    S.copper+=n.coin; S.earned+=n.coin;
    addLog("สำเร็จ: "+n.title, n.coin);
    if (navigator.vibrate) navigator.vibrate(12);
  } else {
    n.done=false; n.day=null; n.week=null; n.doneAt=null;
    S.copper=Math.max(0,S.copper-n.coin); S.earned=Math.max(0,S.earned-n.coin);
    addLog("ยกเลิก: "+n.title, -n.coin);
  }
  save(); render(n.done);
}
function inlineForm(li, mode){
  if (li.querySelector(":scope > .form")) return;
  const n = mode === "edit" ? findNode(li.dataset.id) : null;
  const f = document.createElement("div");
  f.className = "form";
  if (n) li.querySelector(".row").classList.add("hidden");
  f.innerHTML = taskForm(n) + `<div class="frow">
    <button class="btn" data-act="${n?"savenode":"savesub"}">บันทึก</button>
    <button class="btn ghost" data-act="cancel">ยกเลิก</button></div>`;
  li.querySelector(".row").after(f);
  f.querySelector('[data-k="t"]').focus();
}
/* สลับการแสดงช่อง "บางวัน" / "วันที่" ตาม select */
document.addEventListener("change", e => {
  const sel = e.target.closest('[data-k="rep"]'); if (!sel) return;
  const f = sel.closest(".form");
  f.querySelector('[data-k="days"]').classList.toggle("hidden", sel.value !== "days");
  f.querySelector(".date-in").classList.toggle("hidden", sel.value !== "once");
  f.querySelector(".date-lbl").classList.toggle("hidden", sel.value !== "once");
});

document.addEventListener("click", e => {
  const b = e.target.closest("[data-act],[data-day],[data-ico]"); if (!b) return;

  if (b.dataset.day !== undefined){                    // ปุ่มเลือกวัน จ-อา
    b.setAttribute("aria-pressed", b.getAttribute("aria-pressed") !== "true");
    return;
  }
  if (b.dataset.ico){                                   // ปุ่มเลือกไอคอนไทม์ไลน์
    pickIcon = b.dataset.ico; renderIconPicker(); return;
  }

  const act = b.dataset.act, li = b.closest(".node"), grp = b.closest(".group"),
        card = b.closest(".card"), evb = b.closest(".ev");

  if (act==="toggle")  return toggle(li.dataset.id);
  if (act==="edit")    return inlineForm(li,"edit");
  if (act==="sub")     return inlineForm(li,"sub");
  if (act==="cancel")  return render();
  if (act==="addhere") return grp.querySelector(".addbox").classList.remove("hidden");
  if (act==="del"){ removeNode(li.dataset.id); save(); render(); return; }
  if (act==="delgroup"){ S.groups = S.groups.filter(g => g.id!==grp.dataset.gid); save(); render(); return; }
  if (act==="delevent"){ S.events = S.events.filter(x => x.id!==evb.dataset.eid); save(); render(); return; }

  if (act==="addtask" || act==="savesub"){
    const f = b.closest(".form"), d = readTask(f);
    if (!d.title) return;
    const pid = act==="addtask" ? grp.dataset.gid : li.dataset.id;
    addChild(pid, Object.assign({id:uid(), done:false, day:null, week:null, doneAt:null, children:[]}, d));
    save(); render(); return;
  }
  if (act==="savenode"){
    const f = b.closest(".form"), n = findNode(li.dataset.id), d = readTask(f);
    if (d.title) n.title = d.title;
    Object.assign(n, {coin:d.coin, repeat:d.repeat, days:d.days, time:d.time, date:d.date});
    save(); render(); return;
  }
  if (act==="buy"){
    const r = S.rewards.find(x => x.id===card.dataset.rid);
    if (!r || S.copper < r.price) return;
    S.copper -= r.price; S.spent += r.price; r.bought = (r.bought||0)+1;
    addLog("แลกรางวัล: "+r.name, -r.price);
    if (navigator.vibrate) navigator.vibrate([10,40,20]);
    save(); render(true); return;
  }
  if (act==="delreward"){ S.rewards = S.rewards.filter(x => x.id!==card.dataset.rid); save(); render(); return; }
});

$("gAdd").onclick = () => {
  const v = $("gName").value.trim(); if (!v) return;
  S.groups.push({id:uid(), name:v, children:[]}); $("gName").value=""; save(); render();
};
$("rAdd").onclick = () => {
  const v = $("rName").value.trim(); if (!v) return;
  const price = (+$("rG").value||0)*10000 + (+$("rS").value||0)*100 + (+$("rC").value||0);
  S.rewards.push({id:uid(), name:v, price, bought:0}); $("rName").value=""; save(); render();
};
$("eAdd").onclick = () => {
  const title = $("eTitle").value.trim(), date = $("eDate").value;
  if (!title || !date) return;
  S.events.push({ id:uid(), date, title, note:$("eNote").value.trim(), icon:pickIcon, pin:$("ePin").checked });
  addLog("ไทม์ไลน์: "+title, 0);
  $("eTitle").value=""; $("eNote").value=""; $("ePin").checked=false; $("eDate").value = dayKey();
  save(); render();
};

const tabs = { q:["tab-q","view-q"], t:["tab-t","view-t"], s:["tab-s","view-s"], l:["tab-l","view-l"] };
Object.keys(tabs).forEach(k => $(tabs[k][0]).onclick = () => {
  Object.keys(tabs).forEach(j => {
    $(tabs[j][0]).setAttribute("aria-selected", j===k);
    $(tabs[j][1]).classList.toggle("hidden", j!==k);
  });
});

$("expBtn").onclick = () => {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([JSON.stringify(S,null,2)],{type:"application/json"}));
  a.download = "quest-board-" + dayKey() + ".json";
  a.click();
};
$("impBtn").onclick = () => $("impFile").click();
$("impFile").onchange = e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = () => { try{ S = migrate(JSON.parse(r.result)); save(); resetCycles(); render(); }catch(err){ alert("ไฟล์ไม่ถูกต้อง"); } };
  r.readAsText(f);
};
$("wipeBtn").onclick = () => {
  if (!confirm("ล้างข้อมูลทั้งหมด (รวมไทม์ไลน์)? กู้คืนไม่ได้")) return;
  S = { copper:0, earned:0, spent:0, groups:[], rewards:[], events:[], log:[] };
  save(); render();
};

/* ================= heartbeat ================= */
function heartbeat(){
  tickClock();
  const d = dayKey();
  if (d !== curDay){                       // ข้ามวันขณะเปิดแอปค้าง
    curDay = d;
    const w = weekKey();
    if (w !== WK) WK = w;
    resetCycles(); render();
  }
}
setInterval(heartbeat, 1000);
document.addEventListener("visibilitychange", () => { if (!document.hidden) heartbeat(); });

/* ================= PWA ================= */
if ("serviceWorker" in navigator && location.protocol.startsWith("http"))
  window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(()=>{}));
let deferred = null;
window.addEventListener("beforeinstallprompt", e => { e.preventDefault(); deferred = e; $("install").style.display = "flex"; });
$("installBtn").onclick = () => { $("install").style.display="none"; if (deferred){ deferred.prompt(); deferred=null; } };
$("installX").onclick = () => $("install").style.display = "none";

/* ================= boot ================= */
function migrate(d){
  d = Object.assign({ copper:0, earned:0, spent:0, groups:[], rewards:[], events:[], log:[] }, d);
  d.groups.forEach(g => walk(g.children, n => {
    if (!n.repeat) n.repeat = n.weekly ? "weekly" : "once";   // ข้อมูลเวอร์ชันเก่า
    if (!n.days) n.days = [];
    if (n.time === undefined) n.time = null;
    if (n.date === undefined) n.date = null;
    if (n.day  === undefined) n.day  = null;
    delete n.weekly;
  }));
  return d;
}
(async () => {
  const saved = await store.load();
  if (saved) S = migrate(saved);
  else {
    const T = (title, coin, repeat, extra={}) =>
      Object.assign({id:uid(), title, coin, repeat, days:[], time:null, date:null,
                     done:false, day:null, week:null, doneAt:null, children:[]}, extra);
    S.groups = [
      { id:uid(), name:"กิจวัตร", children:[
        T("ดื่มน้ำ 8 แก้ว", 15, "daily"),
        T("ออกกำลังกาย 30 นาที", 40, "days", {days:[1,3,5], time:"18:00"}),
        T("อ่านหนังสือก่อนนอน", 20, "daily", {time:"22:00"})
      ]},
      { id:uid(), name:"บ้าน", children:[
        Object.assign(T("ทำความสะอาดห้อง", 120, "weekly"), { children:[
          T("เก็บโต๊ะ", 20, "weekly"), T("ซักผ้า", 40, "weekly", {days:[]})
        ]})
      ]}
    ];
    S.rewards = [{ id:uid(), name:"ดูซีรีส์ 1 ตอน", price:100, bought:0 }];
    S.events  = [];
  }
  $("eDate").value = dayKey();
  renderIconPicker();
  resetCycles();
  render();
})();
</script>
